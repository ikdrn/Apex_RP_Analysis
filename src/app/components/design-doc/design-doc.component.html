<div class="space-y-4">
  <!-- ガイダンスバナー -->
  <p class="rounded-lg border border-blue-100 bg-blue-50 px-4 py-3 text-xs text-blue-800">
    この設計書は、非エンジニアやジュニアエンジニアでも読めるように「目的→仕組み→テスト」の順でまとめています。
  </p>

  <!-- 左右分割レイアウト -->
  <div class="grid grid-cols-1 gap-4 lg:grid-cols-4">
    <!-- 左側: ナビゲーション -->
    <div class="flex flex-col gap-2 lg:col-span-1">
      <p class="text-xs font-semibold uppercase tracking-wide text-gray-500">セクション</p>
      <div class="flex flex-row gap-2 overflow-x-auto lg:flex-col">
        <button
          *ngFor="let section of sections"
          class="flex-shrink-0 rounded-lg border px-3 py-2 text-xs font-medium transition-colors"
          [ngClass]="selectedSectionId === section.id
            ? 'border-blue-700 bg-blue-700 text-white'
            : 'border-gray-200 bg-white text-gray-700 hover:border-blue-300 hover:bg-blue-50'"
          (click)="selectSection(section.id)"
        >
          {{ section.title }}
        </button>
      </div>
    </div>

    <!-- 右側: コンテンツ -->
    <div class="lg:col-span-3">
      <div *ngIf="selectedSection" class="rounded-lg border border-gray-200 bg-white p-4 sm:p-6">
        <h2 class="mb-4 text-base font-bold text-gray-900">{{ selectedSection.title }}</h2>

        <div class="space-y-3 text-sm text-gray-700">
          <div *ngFor="let item of selectedSection.items" class="border-l-2 border-blue-200 pl-4 py-2">
            <p>
              <b class="text-gray-900">{{ item.label }}:</b> {{ item.content }}
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- フッター -->
  <p class="mt-4 text-center text-xs text-gray-400">
    Apex RP Analysis &bull; Powered by Supabase &amp; Vercel
  </p>
</div>
