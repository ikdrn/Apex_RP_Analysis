<div class="space-y-4">
  <div class="grid grid-cols-1 gap-3 sm:grid-cols-3">
    <div class="rounded-lg border border-blue-100 bg-blue-50 px-4 py-3 dark:border-blue-900 dark:bg-blue-950">
      <p class="text-xs text-blue-700 dark:text-blue-300">現在表示中</p>
      <p class="text-sm font-semibold text-blue-900 dark:text-blue-100">{{ selectedSection?.title }}</p>
    </div>
    <div class="rounded-lg border border-gray-200 bg-white px-4 py-3 dark:border-gray-700 dark:bg-gray-800">
      <p class="text-xs text-gray-500 dark:text-gray-400">セクション数</p>
      <p class="text-sm font-semibold text-gray-900 dark:text-gray-100">{{ sections.length }} 件</p>
    </div>
    <div class="rounded-lg border border-gray-200 bg-white px-4 py-3 dark:border-gray-700 dark:bg-gray-800">
      <p class="text-xs text-gray-500 dark:text-gray-400">閲覧ガイド</p>
      <p class="text-sm font-semibold text-gray-900 dark:text-gray-100">左のメニューから選択</p>
    </div>
  </div>

  <div class="grid grid-cols-1 gap-4 lg:grid-cols-4">
    <div class="flex flex-col gap-2 lg:col-span-1">
      <p class="text-xs font-semibold uppercase tracking-wide text-gray-500 dark:text-gray-400">セクション</p>
      <div class="flex flex-row gap-2 overflow-x-auto lg:flex-col">
        <button
          *ngFor="let section of sections"
          class="flex-shrink-0 rounded-lg border px-3 py-2 text-left text-xs font-medium transition-colors"
          [ngClass]="selectedSectionId === section.id
            ? 'border-blue-700 bg-blue-700 text-white'
            : 'border-gray-200 bg-white text-gray-700 hover:border-blue-300 hover:bg-blue-50 dark:border-gray-700 dark:bg-gray-800 dark:text-gray-300 dark:hover:border-blue-500 dark:hover:bg-gray-700'"
          (click)="selectSection(section.id)"
        >
          {{ section.title }}
        </button>
      </div>
    </div>

    <div class="lg:col-span-3">
      <div *ngIf="selectedSection" class="rounded-lg border border-gray-200 bg-white p-4 sm:p-6 dark:border-gray-700 dark:bg-gray-800">
        <h2 class="mb-4 text-base font-bold text-gray-900 dark:text-gray-100">{{ selectedSection.title }}</h2>

        <div class="space-y-4 text-sm text-gray-700 dark:text-gray-300">
          <section *ngFor="let item of selectedSection.items" class="rounded-lg border border-gray-200 bg-gray-50 p-4 dark:border-gray-700 dark:bg-gray-900/40">
            <p class="mb-3 text-sm font-bold text-gray-900 dark:text-gray-100">{{ item.label }}</p>

            <ng-container *ngIf="item.content">
              <ng-container *ngIf="toKeyValueRows(item.content) as rows">
                <div *ngIf="rows.length > 0; else plainText" class="overflow-x-auto rounded-md border border-gray-200 dark:border-gray-700">
                  <table class="min-w-full divide-y divide-gray-200 text-xs dark:divide-gray-700">
                    <tbody class="divide-y divide-gray-100 bg-white dark:divide-gray-700 dark:bg-gray-800">
                      <tr *ngFor="let row of rows">
                        <th class="w-40 bg-gray-50 px-3 py-2 text-left font-semibold text-gray-600 dark:bg-gray-900 dark:text-gray-300">{{ row.key }}</th>
                        <td class="px-3 py-2 text-gray-700 dark:text-gray-200">{{ row.value }}</td>
                      </tr>
                    </tbody>
                  </table>
                </div>
              </ng-container>
            </ng-container>

            <ng-template #plainText>
              <p class="whitespace-pre-line leading-relaxed">{{ item.content }}</p>
            </ng-template>

            <div *ngIf="item.diagram" class="mt-4 overflow-x-auto rounded-lg border border-blue-200 bg-white p-4 shadow-sm dark:border-blue-800 dark:bg-gray-900">
              <p class="mb-2 text-xs font-semibold text-blue-700 dark:text-blue-300">図解</p>
              <div class="mermaid flex justify-center">{{ item.diagram }}</div>
            </div>
          </section>
        </div>
      </div>
    </div>
  </div>

  <p class="mt-4 text-center text-xs text-gray-400 dark:text-gray-500">
    Apex RP Analysis &bull; Powered by Supabase &amp; Vercel
  </p>
</div>
