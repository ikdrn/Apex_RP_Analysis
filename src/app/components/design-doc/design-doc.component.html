<div class="grid grid-cols-1 gap-4 lg:grid-cols-4">
  <!-- 左側: ナビゲーション -->
  <div class="flex flex-col gap-2 lg:col-span-1">
    <p class="text-xs font-semibold uppercase tracking-wide text-gray-500 dark:text-gray-400">セクション</p>
    <div class="flex flex-row gap-2 overflow-x-auto lg:flex-col">
      <button
        *ngFor="let section of sections"
        class="flex-shrink-0 rounded-lg border px-3 py-2 text-xs font-medium transition-colors text-left"
        [ngClass]="selectedSectionId === section.id
          ? 'border-blue-700 bg-blue-700 text-white'
          : 'border-gray-200 bg-white text-gray-700 hover:border-blue-300 hover:bg-blue-50 dark:border-gray-700 dark:bg-gray-800 dark:text-gray-300 dark:hover:border-blue-500 dark:hover:bg-gray-700'"
        (click)="selectSection(section.id)"
      >
        {{ section.title }}
      </button>
    </div>
  </div>

  <!-- 右側: コンテンツ -->
  <div class="lg:col-span-3">
    <div *ngIf="selectedSection" class="rounded-lg border border-gray-200 bg-white dark:border-gray-700 dark:bg-gray-800">
      <!-- セクションヘッダー -->
      <div class="border-b border-gray-200 px-4 py-3 dark:border-gray-700">
        <h2 class="text-base font-bold text-gray-900 dark:text-gray-100">{{ selectedSection.title }}</h2>
      </div>

      <!-- コンテンツテーブル -->
      <div class="overflow-hidden">
        <table class="w-full border-collapse text-sm">
          <tbody>
            <tr *ngFor="let item of selectedSection.items; let last = last"
              [class.border-b]="!last"
              class="border-gray-100 dark:border-gray-700">
              <td class="w-36 min-w-[8rem] align-top border-r border-gray-100 bg-gray-50 px-3 py-3 dark:border-gray-700 dark:bg-gray-900/40">
                <span class="text-xs font-semibold text-gray-600 dark:text-gray-400">{{ item.label }}</span>
              </td>
              <td class="px-4 py-3 align-top text-gray-700 dark:text-gray-300">
                <p *ngIf="item.content" class="whitespace-pre-line leading-relaxed text-xs">{{ item.content }}</p>
                <div *ngIf="item.contentHtml" class="design-doc-html text-xs leading-relaxed" [innerHTML]="safe(item.contentHtml)"></div>
                <div *ngIf="item.diagram" class="mt-3 overflow-x-auto rounded-lg border border-gray-100 bg-gray-50 p-4 dark:border-gray-600 dark:bg-gray-900">
                  <div class="mermaid flex justify-center">{{ item.diagram }}</div>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- フッター -->
<p class="mt-4 text-center text-xs text-gray-400 dark:text-gray-500">
  Apex RP Analysis &bull; Powered by Supabase &amp; Vercel
</p>
